<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    @media (prefers-color-scheme: dark) {
      .ring1, .ring2 { stroke: #f0f0f0; }
      .dot, .bar { fill: #f0f0f0; }
      .pulse { fill: #f0f0f0; }
    }
  </style>

  <!-- Outer open arc -->
  <circle cx="50" cy="50" r="42" fill="none" class="ring1"
    stroke="#1a1a1a" stroke-width="7"
    stroke-dasharray="220 44" stroke-dashoffset="0"
    stroke-linecap="round"/>

  <!-- Inner open arc -->
  <circle cx="50" cy="50" r="26" fill="none" class="ring2"
    stroke="#1a1a1a" stroke-width="6"
    stroke-dasharray="128 35" stroke-dashoffset="80"
    stroke-linecap="round"/>

  <!-- Pulse dots -->
  <circle cx="83" cy="36" r="5" class="pulse" fill="#1a1a1a"/>
  <circle cx="90" cy="52" r="3" class="pulse" fill="#1a1a1a"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="7" class="dot" fill="#1a1a1a"/>

  <!-- Crossbar -->
  <rect x="50" y="46" width="22" height="7" rx="3.5" class="bar" fill="#1a1a1a"/>
</svg>